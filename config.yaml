# ─────────────────────────────────────────────
# Multi-Agent RAG System — Top-Level Config
# ─────────────────────────────────────────────

# LLM Configuration
# To swap a model: change the value here. Agent code never changes.
# Per-agent provider override: add  provider: ollama  (or  provider: openai)
# to any agent entry to override the top-level provider for that agent only.
# Example:
#   synthesizer:
#     model: qwen2.5:7b
#     temperature: 0.1
#     provider: ollama
# llm:
#   provider: openai
#   agents:
#     chat:
#       model: gpt-4o
#       temperature: 0.3
#     planner:
#       model: gpt-4o
#       temperature: 0.0
#     router:
#       model: gpt-4o
#       temperature: 0.0
#     librarian:
#       model: gpt-4o
#       temperature: 0.0
#     data_scientist:
#       model: gpt-4o
#       temperature: 0.0
#     synthesizer:
#       model: gpt-4o
#       temperature: 0.1  
#     auditor:
#       model: gpt-4o
#       temperature: 0.0

llm:
  provider: openai
  agents:
    chat:
      model: gpt-4.1-nano
      temperature: 0.3
    planner:
      model: gpt-4.1-mini
      temperature: 0.0
    router:
      model: gpt-4.1-nano
      temperature: 0.0
    librarian:
      model: gpt-4.1-mini
      temperature: 0.0
    data_scientist:
      model: gpt-4.1-mini
      temperature: 0.0
    synthesizer:
      model: gpt-4.1-mini
      temperature: 0.1  
    auditor:
      model: gpt-5-mini
      temperature: 0.0

# Retry Logic
retry:
  max_attempts: 3
  failure_message: "I could not verify an answer for your question."

# Retrieval Settings
retrieval:
  initial_fetch: 20       # ChromaDB retrieves this many chunks
  final_top_k: 5          # How many chunks reach the Synthesizer
  reranker_enabled: true
  chunk_size: 500          # Target characters per chunk at ingest time
  chunk_overlap: 50        # Overlap between consecutive chunks at ingest time
  prefilter_top_k: 3       # Sources retrieved from source_index before Planner

# Data Paths
paths:
  pdfs:       data/pdfs/
  tables:     data/tables/
  chroma_db:  data/chroma_db/
  manifest_index:  data/manifest_index.yaml
  manifest_detail: data/manifest_detail.yaml

# Observability
langsmith:
  enabled: true
  project: multi-agent-rag

# Session
session:
  memory: in_memory     # Options: in_memory | sqlite (future) | redis (future)

# API
api:
  host: 0.0.0.0
  port: 8000
  reload: false          # Set to false in production
