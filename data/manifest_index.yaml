pdfs:
- id: travel_policy_2024
  name: Travel Policy 2024
  summary: This document outlines the 2024 corporate travel policy detailing flight
    class entitlements, booking rules, hotel allowances, per diem rates, and expense
    reimbursement procedures based on employee clearance levels.
  contains:
  - flight class entitlements by employee clearance level
  - advance flight booking requirements and exceptions
  - hotel accommodation nightly reimbursement limits
  - per diem meal and incidental expense rates
  - expense claim submission deadlines and receipt requirements
  - manager and finance department approval processes
  - travel expense reimbursement policies
  - travel budget control measures
  - travel policy compliance rules
- id: hr_handbook_v3
  name: Hr Handbook V3
  summary: This HR Handbook v3 outlines the onboarding process, leave policies, and
    performance review procedures for employees.
  contains:
  - employee onboarding checklist and procedures
  - required employment documents for new hires
  - IT equipment provisioning and security setup
  - leave entitlements by clearance level
  - annual, sick, and parental leave policies
  - leave request and approval process
  - performance review schedule and documentation
  - employee performance rating scale
  - mandatory compliance training requirements
  - employee role and goal setting during onboarding
- id: it_security_policy
  name: It Security Policy
  summary: This IT Security Policy document outlines password requirements, data classification
    standards, and security incident reporting procedures to ensure corporate information
    protection and compliance.
  contains:
  - password complexity and length requirements
  - password rotation and history rules
  - multi-factor authentication enforcement
  - data classification categories and handling rules
  - access restrictions based on data classification
  - encryption requirements for restricted data
  - security incident definition and reporting procedures
  - account lockout and password reset processes
  - data transmission policies for sensitive information
  - employee data protection policies
- id: finance_policy_2024
  name: Finance Policy 2024
  summary: The Finance Policy 2024 outlines expense approval thresholds, project budget
    limits by department and clearance level, reimbursement procedures including international
    expenses and dispute resolution, and vendor payment terms.
  contains:
  - expense approval thresholds by amount and approvers
  - receipt requirements and turnaround times for expenses
  - monthly project budget limits by department and clearance level
  - budget overrun approval requirements
  - reimbursement claim submission deadlines and processing times
  - cross-references to travel expense policies
  - international expense pre-approval and currency conversion rules
  - dispute and appeal process for reimbursement claims
  - vendor invoice payment terms and early payment discount criteria
tables:
- id: employees
  name: Employees
  summary: This table contains information about employees, including their personal
    details, department, and managerial relationships.
  contains:
  - employee names
  - departments
  - clearance levels
  - hire dates
  - manager relationships
- id: salary_bands
  name: Salary Bands
  summary: This table contains information about departments, their clearance levels,
    and salary ranges.
  contains:
  - salary ranges by clearance level and department
- id: training_records
  name: Training Records
  summary: This table records employee training details including completion and expiry
    dates, status, and scores.
- id: projects
  name: Projects
  summary: This table contains information about various projects, including their
    details, budget, and status.
