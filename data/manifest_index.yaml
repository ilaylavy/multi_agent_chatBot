pdfs:
- id: travel_policy_2024
  name: Travel Policy 2024
  summary: The Travel Policy 2024 outlines flight class entitlements, booking rules,
    hotel allowances, per diem rates, and expense reimbursement processes based on
    employee clearance levels.
  contains:
  - flight class entitlements by clearance level
  - advance booking rules
  - hotel nightly reimbursement limits
  - per diem meal and incidental rates
  - expense claim submission process
- id: hr_handbook_v3
  name: Hr Handbook V3
  summary: The HR Handbook v3 outlines onboarding procedures, leave policies, and
    performance review processes for employees.
  contains:
  - onboarding checklist requirements
  - employment document submission
  - IT setup procedures
  - annual leave entitlements
  - sick leave policy
  - parental leave options
  - performance review schedule
  - employee rating scale
- id: it_security_policy
  name: It Security Policy
  summary: The document outlines IT security policies including password requirements,
    data classification, and security incident reporting.
  contains:
  - password complexity requirements
  - password rotation policy
  - multi-factor authentication methods
  - data classification categories
  - restricted data handling procedures
- id: finance_policy_2024
  name: Finance Policy 2024
  summary: The Finance Policy 2024 outlines expense approval thresholds, project budget
    limits, reimbursement procedures, and vendor payment terms.
  contains:
  - expense approval thresholds
  - project budget limits
  - reimbursement procedures
  - vendor payment terms
  - international expense pre-approval
  - budget overrun approvals
  - disputed reimbursement claims
  - vendor invoice processing
  - currency conversion for expenses
tables:
- id: employees
  name: Employees
  summary: This table contains information about employees, including their personal
    details, department, and managerial relationships.
  contains:
  - employee names
  - departments
  - clearance levels
  - hire dates
  - manager relationships
- id: salary_bands
  name: Salary Bands
  summary: This table contains information about departments, their clearance levels,
    and salary ranges.
  contains:
  - salary ranges by clearance level and department
- id: training_records
  name: Training Records
  summary: This table records employee training details including completion and expiry
    dates, status, and scores.
- id: projects
  name: Projects
  summary: This table contains information about various projects, including their
    details, budget, and status.
