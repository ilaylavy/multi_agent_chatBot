pdfs:
- id: travel_policy_2024
  name: Travel Policy 2024
  summary: This document outlines the 2024 corporate travel policy including flight
    class entitlements, booking rules, hotel allowances, per diem rates, and expense
    reimbursement procedures based on employee clearance levels.
  contains:
  - flight class entitlements by employee clearance level
  - advance flight booking requirements and exceptions
  - hotel nightly reimbursement limits by clearance level
  - per diem meal and incidental expense rates
  - travel expense claim submission deadlines
  - receipt requirements for expense claims
  - approval thresholds for travel expenses
  - reimbursement processing timelines
  - dispute procedures for travel reimbursements
  - annual adjustment of per diem rates based on CPI
  notes: ''
- id: hr_handbook_v3
  name: Hr Handbook V3
  summary: This HR Handbook v3 outlines the company's policies and procedures on employee
    onboarding, leave entitlements, performance reviews, and code of conduct.
  contains:
  - onboarding checklist requirements
  - required employment documents for new hires
  - IT provisioning and security setup policies
  - leave entitlements by clearance level
  - leave request procedures and advance notice rules
  - annual, sick, and parental leave details
  - performance review schedule and rating criteria
  - performance improvement plan guidelines
  - confidentiality and non-disclosure obligations
  - conflict of interest disclosure requirements
  - disciplinary action stages and gross misconduct policies
  notes: ''
- id: it_security_policy
  name: It Security Policy
  summary: This IT Security Policy document outlines password requirements, data classification
    standards, security incident reporting procedures, data access permissions, and
    incident severity classifications to ensure corporate information security.
  contains:
  - password complexity and rotation rules
  - multi-factor authentication enforcement
  - data classification categories and handling rules
  - security incident definition and reporting deadlines
  - incident reporting channels and immediate response steps
  - data access permissions by clearance level
  - temporary elevated access procedures
  - security incident severity levels and escalation protocols
  - post-incident review and reporting requirements
  - encryption and storage requirements for restricted data
  notes: ''
- id: finance_policy_2024
  name: Finance Policy 2024
  summary: This Finance Policy 2024 document outlines expense approval thresholds,
    project budget limits by department and clearance level, reimbursement procedures,
    and vendor payment terms.
  contains:
  - employee expense approval rules
  - expense receipt requirements
  - expense turnaround times
  - monthly project budget limits by department
  - clearance level budget restrictions
  - budget overrun justification and approvals
  - expense reimbursement submission and processing
  - international expense pre-approval and currency conversion
  - reimbursement dispute appeal process
  - vendor invoice payment terms and penalties
  - small purchase payment procedures
  - vendor dispute escalation timelines
  notes: ''
tables:
- id: employees
  name: Employees
  summary: This table contains employee information including personal details, department,
    security clearance, hire date, and managerial hierarchy.
  contains:
  - employee names
  - employee email addresses
  - department assignments
  - security clearance levels
  - hire dates
  - manager relationships
  - organizational hierarchy
  - employee identifiers
  notes: ''
- id: salary_bands
  name: Salary Bands
  summary: This table lists salary ranges by clearance level and department within
    an organization.
  contains:
  - salary ranges
  - clearance levels
  - department salary data
  - minimum salaries
  - maximum salaries
  - organizational departments
  - security clearance salary
  - salary currency
  notes: ''
- id: training_records
  name: Training Records
  summary: This table records employee training completion details including training
    type, dates, status, and scores.
  contains:
  - employee training records
  - training completion dates
  - training expiry tracking
  - training status monitoring
  - training scores
  - employee compliance training
  - training course types
  - certification validity periods
  notes: ''
- id: projects
  name: Projects
  summary: This table contains detailed information about various departmental projects
    including their budgets, timelines, statuses, and lead employees.
  contains:
  - project identifiers
  - project names
  - department assignments
  - project lead employee IDs
  - project budgets
  - project expenditures
  - project statuses
  - project start dates
  - project end dates
  notes: ''
