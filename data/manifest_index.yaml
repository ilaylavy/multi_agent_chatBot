pdfs:
- id: travel_policy_2024
  name: Travel Policy 2024
  summary: This document outlines the 2024 corporate travel policy detailing flight
    class entitlements, booking rules, hotel allowances, per diem rates, and expense
    reimbursement procedures based on employee clearance levels.
  contains:
  - flight class entitlements by employee clearance level
  - advance booking requirements and exceptions
  - hotel accommodation nightly reimbursement limits
  - per diem meal and incidental expense rates
  - expense claim submission deadlines and receipt requirements
  - manager approval conditions for exceptions and upgrades
  - travel expense reimbursement procedures
  - policy updates based on Consumer Price Index
  - rules for last-minute travel bookings
  - clearance level based travel benefits and restrictions
- id: hr_handbook_v3
  name: Hr Handbook V3
  summary: This HR Handbook v3 outlines the onboarding process, leave policies, and
    performance review procedures for employees.
  contains:
  - onboarding checklist requirements
  - required employment documents for new hires
  - IT setup and security protocols for new employees
  - leave entitlements by clearance level
  - annual leave carry-over rules
  - sick leave policy and medical certificate requirements
  - parental leave entitlements and options
  - performance review schedule and process
  - employee performance rating scale
- id: it_security_policy
  name: It Security Policy
  summary: This IT Security Policy outlines password requirements, data classification
    standards, and security incident reporting procedures to ensure corporate information
    protection and compliance.
  contains:
  - password complexity and length requirements
  - password rotation and history rules
  - multi-factor authentication enforcement
  - data classification categories and handling rules
  - access restrictions based on data classification
  - encryption requirements for restricted data
  - security incident definition and reporting procedures
  - account lockout policies after password expiration
  - MFA enrollment timelines
  - reporting unauthorized access incidents
- id: finance_policy_2024
  name: Finance Policy 2024
  summary: This Finance Policy 2024 document outlines employee expense approval thresholds,
    project budget limits by department and clearance level, reimbursement procedures
    including international expenses and dispute resolution, and vendor payment terms.
  contains:
  - employee expense approval thresholds by amount
  - required approvers for expenses
  - receipt and turnaround time requirements
  - monthly project budget limits by department and clearance level
  - budget overrun approval requirements
  - expense reimbursement submission and processing procedures
  - international expense pre-approval and currency conversion rules
  - dispute and appeal process for reimbursement claims
  - vendor invoice payment terms and early payment discount criteria
tables:
- id: employees
  name: Employees
  summary: This table contains employee information including personal details, department,
    security clearance, hire date, and managerial hierarchy.
  contains:
  - employee names
  - employee email addresses
  - department assignments
  - security clearance levels
  - hire dates
  - manager-subordinate relationships
  - organizational hierarchy
- id: salary_bands
  name: Salary Bands
  summary: This table lists salary ranges by clearance level and department within
    an organization.
  contains:
  - salary ranges
  - clearance levels
  - department salary data
  - minimum salaries
  - maximum salaries
  - salary currency
  - organizational departments
  - security clearance salary bands
- id: training_records
  name: Training Records
  summary: This table records employee training completion details including training
    names, dates, status, and scores.
  contains:
  - employee training records
  - training completion dates
  - training expiry dates
  - training status tracking
  - employee training scores
  - training course names
  - employee training history
- id: projects
  name: Projects
  summary: This table contains detailed information about various projects including
    their identifiers, names, departments, lead employees, budgets, expenditures,
    statuses, and timelines.
  contains:
  - project identifiers
  - project names
  - department assignments
  - project lead employee IDs
  - project budgets
  - project expenditures
  - project statuses
  - project start dates
  - project end dates
