data_context: This system can assist with questions related to company policies on
  travel, finance, human resources, and information security, providing guidance on
  rules for employee travel arrangements, expense reimbursements, leave entitlements,
  performance reviews, and data protection measures. It can also answer inquiries
  about employee information such as department assignments, security clearances,
  salary ranges, training completion, and project involvement. Whether you need to
  understand approval processes, budget limits, compliance requirements, or organizational
  structure, the system offers insights based on internal corporate guidelines and
  records. It is well-suited for clarifying procedures, eligibility criteria, and
  timelines associated with employee management, financial controls, and security
  protocols within a workplace setting.
