tables:
- id: salary_bands
  filename: salary_bands.sqlite
  type: sqlite
  base_path: tests/fixtures/tables/
  row_count_approx: 16
  columns:
  - name: id
    type: integer
    description: A unique identifier for each record.
  - name: clearance_level
    type: string
    description: The security clearance level required for the department.
  - name: department
    type: string
    description: The name of the department.
  - name: salary_min
    type: integer
    description: The minimum salary offered in the department.
  - name: salary_max
    type: integer
    description: The maximum salary offered in the department.
  - name: currency
    type: string
    description: The currency in which the salary is paid.
  relationships: []
  table_name: salary_bands
- id: employees
  filename: employees.csv
  type: csv
  base_path: tests/fixtures/tables/
  row_count_approx: 10
  columns:
  - name: employee_id
    type: integer
    description: A unique identifier for each employee.
  - name: full_name
    type: string
    description: The full name of the employee.
  - name: email
    type: string
    description: The email address of the employee.
  - name: department
    type: string
    description: The department in which the employee works.
  - name: clearance_level
    type: string
    description: The security clearance level assigned to the employee.
  - name: hire_date
    type: string
    description: The date the employee was hired.
  - name: manager_id
    type: float
    description: The employee ID of the employee's manager, if applicable.
  relationships:
  - manager_id links to employee_id
- id: training_records
  filename: training_records.csv
  type: csv
  base_path: data/tables/
  row_count_approx: 25
  columns:
  - name: record_id
    type: integer
    description: A unique identifier for each training record.
  - name: employee_id
    type: integer
    description: The identifier for the employee who completed the training.
  - name: training_name
    type: string
    description: The name of the training program completed by the employee.
  - name: completion_date
    type: string
    description: The date on which the training was completed.
  - name: expiry_date
    type: string
    description: The date on which the training certification expires.
  - name: status
    type: string
    description: The current status of the training, such as 'Completed' or 'Expired'.
  - name: score
    type: float
    description: The score achieved by the employee in the training program.
  relationships:
  - employee_id links to employees.employee_id
- id: projects
  filename: projects.csv
  type: csv
  base_path: data/tables/
  row_count_approx: 12
  columns:
  - name: project_id
    type: integer
    description: A unique identifier for each project.
  - name: project_name
    type: string
    description: The name of the project.
  - name: department
    type: string
    description: The department responsible for the project.
  - name: lead_employee_id
    type: integer
    description: The ID of the employee leading the project.
  - name: budget
    type: integer
    description: The allocated budget for the project.
  - name: spent
    type: integer
    description: The amount of money spent on the project so far.
  - name: status
    type: string
    description: The current status of the project (e.g., Active, Completed).
  - name: start_date
    type: string
    description: The date when the project started.
  - name: end_date
    type: string
    description: The date when the project is expected to or has been completed.
  relationships:
  - lead_employee_id links to employees.employee_id
