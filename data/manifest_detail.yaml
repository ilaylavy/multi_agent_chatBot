# ─────────────────────────────────────────────────────────────
# Manifest Detail — Worker View
# ─────────────────────────────────────────────────────────────
# Workers (Librarian, Data Scientist) read ONLY the entry
# for their assigned source_id. They never see the full file.
# ─────────────────────────────────────────────────────────────

pdfs:
- id: travel_policy_2024
  filename: travel_policy_2024.pdf
  type: pdf
  pages: 2
  sections:
  - Flight Class Entitlements by Clearance Level
  - Booking Rules
  - Hotel Nightly Allowances
  - Per Diem Meal Rates
  - Receipt and Reimbursement Process
  tags:
  - travel policy
  - flight entitlements
  - hotel allowances
  - per diem rates
  - reimbursement process
  - clearance levels
  - corporate travel
  - booking rules
  - expense claims
  - meal expenses
tables:
- id: employees
  filename: employees.csv
  type: csv
  row_count_approx: 10
  columns:
  - name: employee_id
    type: integer
    description: A unique identifier for each employee.
  - name: full_name
    type: string
    description: The full name of the employee.
  - name: email
    type: string
    description: The email address of the employee.
  - name: department
    type: string
    description: The department in which the employee works.
  - name: clearance_level
    type: string
    description: The security clearance level assigned to the employee.
  - name: hire_date
    type: string
    description: The date the employee was hired.
  - name: manager_id
    type: float
    description: The employee ID of the employee's manager, if applicable.
  relationships:
  - manager_id links to employee_id
- id: salary_bands
  filename: salary_bands.sqlite
  type: sqlite
  row_count_approx: 16
  columns:
  - name: id
    type: integer
    description: A unique identifier for each record.
  - name: clearance_level
    type: string
    description: The security clearance level required for the department.
  - name: department
    type: string
    description: The name of the department.
  - name: salary_min
    type: integer
    description: The minimum salary offered in the department.
  - name: salary_max
    type: integer
    description: The maximum salary offered in the department.
  - name: currency
    type: string
    description: The currency in which the salary is paid.
  relationships: []
  table_name: salary_bands
