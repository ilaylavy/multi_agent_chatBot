pdfs:
- id: travel_policy_2024
  filename: travel_policy_2024.pdf
  type: pdf
  pages: 4
  sections:
  - heading: 'Section 1: Flight Class Entitlements by Clearance Level'
    summary: Defines flight class entitlements for employees based on their clearance
      level, specifying allowed classes and conditions for upgrades.
  - heading: 'Section 2: Booking Rules'
    summary: Details advance booking requirements and approval conditions for last-minute
      travel bookings.
  - heading: 'Section 3: Hotel Nightly Allowances'
    summary: Specifies maximum reimbursable hotel rates per night by clearance level
      and accommodation preferences.
  - heading: 'Section 4: Per Diem Rates'
    summary: Outlines daily meal and incidental expense allowances by clearance level
      and conditions for claims exceeding per diem.
  - heading: 'Section 5: Expense Reimbursement Process'
    summary: Describes the submission timeline, receipt requirements, approval thresholds,
      and payment procedures for travel expense reimbursements.
  tags:
  - corporate travel policy
  - flight class entitlements
  - travel booking rules
  - hotel reimbursement limits
  - per diem rates
  - expense reimbursement
  - clearance levels
  - travel expense approval
  - travel receipts
  - travel policy 2024
  notes: ''
- id: hr_handbook_v3
  filename: hr_handbook_v3.pdf
  type: pdf
  pages: 4
  sections:
  - heading: 'Chapter 1: Onboarding'
    summary: Details the onboarding process including required documents, IT setup,
      and initial training and meetings for new employees.
  - heading: 'Chapter 2: Leave Policy'
    summary: Describes leave entitlements based on clearance levels, procedures for
      requesting leave, and specifics on annual, sick, and parental leave.
  - heading: 'Chapter 3: Performance Reviews'
    summary: Explains the biannual performance review process, rating scale, and consequences
      including performance improvement plans and promotion eligibility.
  - heading: 'Chapter 4: Code of Conduct'
    summary: Covers confidentiality obligations, conflict of interest disclosures,
      and the disciplinary process including steps and consequences for misconduct.
  tags:
  - employee onboarding
  - leave policy
  - performance reviews
  - code of conduct
  - confidentiality
  - conflict of interest
  - disciplinary process
  - IT setup
  - employee documents
  - performance improvement plan
  notes: ''
- id: it_security_policy
  filename: it_security_policy.pdf
  type: pdf
  pages: 5
  sections:
  - heading: 'Section 1: Password Policy'
    summary: Defines password complexity, length, rotation, history, and mandatory
      multi-factor authentication requirements for all corporate systems.
  - heading: 'Section 2: Data Classification'
    summary: Describes four data categories—Public, Internal, Confidential, and Restricted—with
      associated access, storage, and transmission controls.
  - heading: 'Section 3: Security Incident Reporting'
    summary: Specifies the definition of security incidents, reporting deadlines,
      reporting methods, immediate response actions, and post-incident review procedures.
  - heading: 'Section 4: Data Access Matrix'
    summary: Provides a matrix of data access permissions by clearance level and outlines
      procedures for requesting and approving access outside the matrix.
  - heading: 'Section 5: Incident Severity Classification'
    summary: Classifies security incidents by severity with corresponding response
      times, escalation paths, and reporting requirements.
  tags:
  - IT security policy
  - password requirements
  - multi-factor authentication
  - data classification
  - security incident reporting
  - data access control
  - incident severity levels
  - corporate data protection
  - access clearance levels
  - security incident response
  notes: ''
- id: finance_policy_2024
  filename: finance_policy_2024.pdf
  type: pdf
  pages: 4
  sections:
  - heading: 'Section 1: Expense Approval Thresholds'
    summary: Defines approval requirements, receipt needs, and turnaround times for
      employee expenses based on amount ranges.
  - heading: 'Section 2: Project Budget Limits by Department and Clearance Level'
    summary: Specifies monthly project budget limits per department and clearance
      level, including rules for budget overruns and approvals.
  - heading: 'Section 3: Reimbursement Procedures'
    summary: Details submission timelines, processing times, international expense
      rules, dispute processes, and cross-references to travel policies for reimbursements.
  - heading: 'Section 4: Vendor Payment Terms'
    summary: Outlines payment terms for standard and preferred vendors, small purchase
      rules, late payment penalties, and vendor dispute escalation procedures.
  tags:
  - expense approval thresholds
  - project budget limits
  - department clearance levels
  - reimbursement procedures
  - international expenses
  - vendor payment terms
  - late payment penalties
  - budget overrun approvals
  - expense submission deadlines
  - vendor dispute resolution
  notes: ''
tables:
- id: salary_bands
  filename: salary_bands.sqlite
  type: sqlite
  base_path: tests/fixtures/tables/
  row_count_approx: 16
  columns:
  - name: id
    type: integer
    nullable: false
    null_count: 0
    min: 1
    max: 16
    format: integer
    description: Unique identifier for each salary range entry
  - name: clearance_level
    type: string
    nullable: false
    null_count: 0
    unique_values:
    - A
    - B
    - C
    - D
    description: Security clearance level associated with the salary range
  - name: department
    type: string
    nullable: false
    null_count: 0
    unique_values:
    - Engineering
    - Finance
    - HR
    - Sales
    description: Department within the organization for the salary range
  - name: salary_min
    type: integer
    nullable: false
    null_count: 0
    min: 50000
    max: 150000
    format: integer
    description: Minimum salary for the given clearance level and department
  - name: salary_max
    type: integer
    nullable: false
    null_count: 0
    min: 72000
    max: 220000
    format: integer
    description: Maximum salary for the given clearance level and department
  - name: currency
    type: string
    nullable: false
    null_count: 0
    unique_values:
    - USD
    description: Currency in which the salary is denominated
