tables:
- id: employees
  filename: employees.csv
  type: csv
  row_count_approx: 10
  columns:
  - name: employee_id
    type: integer
    description: A unique identifier for each employee.
  - name: full_name
    type: string
    description: The full name of the employee.
  - name: email
    type: string
    description: The email address of the employee.
  - name: department
    type: string
    description: The department in which the employee works.
  - name: clearance_level
    type: string
    description: The security clearance level assigned to the employee.
  - name: hire_date
    type: string
    description: The date the employee was hired.
  - name: manager_id
    type: float
    description: The employee ID of the employee's manager, if applicable.
  relationships:
  - manager_id links to employee_id
- id: salary_bands
  filename: salary_bands.sqlite
  type: sqlite
  row_count_approx: 16
  columns:
  - name: id
    type: integer
    description: A unique identifier for each job position.
  - name: clearance_level
    type: string
    description: The security clearance level required for the job position.
  - name: department
    type: string
    description: The department to which the job position belongs.
  - name: salary_min
    type: integer
    description: The minimum salary offered for the job position.
  - name: salary_max
    type: integer
    description: The maximum salary offered for the job position.
  - name: currency
    type: string
    description: The currency in which the salary is paid.
  relationships: []
  table_name: salary_bands
