tables:
- id: salary_bands
  filename: salary_bands.sqlite
  type: sqlite
  base_path: tests/fixtures/tables/
  row_count_approx: 16
  columns:
  - name: id
    type: integer
    description: Unique identifier for each salary range entry
  - name: clearance_level
    type: string
    description: Security clearance level associated with the salary range
  - name: department
    type: string
    description: Department name within the organization
  - name: salary_min
    type: integer
    description: Minimum salary for the given clearance level and department
  - name: salary_max
    type: integer
    description: Maximum salary for the given clearance level and department
  - name: currency
    type: string
    description: Currency in which the salary is denominated
  relationships:
  - clearance_level links to clearance_levels.level
  - department links to departments.name
  table_name: salary_bands
- id: employees
  filename: employees.csv
  type: csv
  base_path: tests/fixtures/tables/
  row_count_approx: 10
  columns:
  - name: employee_id
    type: integer
    description: Unique identifier for each employee
  - name: full_name
    type: string
    description: Full name of the employee
  - name: email
    type: string
    description: Corporate email address of the employee
  - name: department
    type: string
    description: Department where the employee works
  - name: clearance_level
    type: string
    description: Security clearance level assigned to the employee
  - name: hire_date
    type: string
    description: Date when the employee was hired
  - name: manager_id
    type: float
    description: Employee ID of the employee's manager, if applicable
  relationships:
  - manager_id links to employee_id in the same table
- id: training_records
  filename: training_records.csv
  type: csv
  base_path: tests/fixtures/tables/
  row_count_approx: 25
  columns:
  - name: record_id
    type: integer
    description: Unique identifier for each training record
  - name: employee_id
    type: integer
    description: Identifier linking the training record to a specific employee
  - name: training_name
    type: string
    description: Name of the training course completed by the employee
  - name: completion_date
    type: string
    description: Date when the training was completed
  - name: expiry_date
    type: string
    description: Date when the training certification or validity expires
  - name: status
    type: string
    description: Current status of the training (e.g., Completed, Expired)
  - name: score
    type: float
    description: Score or grade achieved by the employee in the training
  relationships:
  - employee_id links to employees.employee_id
- id: projects
  filename: projects.csv
  type: csv
  base_path: tests/fixtures/tables/
  row_count_approx: 12
  columns:
  - name: project_id
    type: integer
    description: Unique identifier for each project
  - name: project_name
    type: string
    description: Name or title of the project
  - name: department
    type: string
    description: Department responsible for the project
  - name: lead_employee_id
    type: integer
    description: Identifier of the employee leading the project
  - name: budget
    type: integer
    description: Allocated budget amount for the project
  - name: spent
    type: integer
    description: Amount of budget spent so far on the project
  - name: status
    type: string
    description: Current status of the project such as Active or Completed
  - name: start_date
    type: string
    description: Date when the project started
  - name: end_date
    type: string
    description: Date when the project ended or is expected to end
  relationships:
  - lead_employee_id links to employees.employee_id
